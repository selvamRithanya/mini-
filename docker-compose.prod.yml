version: '3.8'

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - PORT=8080
    ports:
      - "80:8080"
    depends_on:
      - mysql
    volumes:
      - ./docker/db.properties:/app/target/classes/db.properties:ro

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: employee_db
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
